<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Arrivals - Eman Fashion Hub</title>
    <link rel="stylesheet" href="./static-pages.css">
    <style>
        * { box-sizing: border-box; }
        
        .products-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .product-card {
            border: 1px solid #ddd;
            border-radius: 8px;
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
            background: white;
            display: flex;
            flex-direction: column;
        }
        
        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 20px rgba(0,0,0,0.15);
        }
        
        .product-image-wrapper {
            position: relative;
            width: 100%;
            height: 250px;
            background: #f5f5f5;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .product-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .image-counter {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.6);
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
        }
        
        .nav-button {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.5);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.3s;
            z-index: 10;
        }
        
        .nav-button:hover {
            background: rgba(0,0,0,0.8);
        }
        
        .nav-button.left {
            left: 10px;
        }
        
        .nav-button.right {
            right: 10px;
        }
        
        .product-info {
            padding: 15px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }
        
        .product-name {
            font-weight: bold;
            margin: 10px 0;
            font-size: 14px;
            line-height: 1.3;
            min-height: 35px;
            flex-grow: 1;
        }
        
        .product-price {
            color: #e74c3c;
            font-size: 16px;
            font-weight: bold;
            margin: 8px 0;
        }
        
        .product-category {
            color: #666;
            font-size: 12px;
            text-transform: uppercase;
            margin: 5px 0;
        }
        
        .product-rating {
            color: #f39c12;
            font-size: 12px;
            margin: 5px 0;
        }
        
        .new-badge {
            display: inline-block;
            background: #e74c3c;
            color: white;
            padding: 3px 8px;
            border-radius: 3px;
            font-size: 11px;
            margin: 5px 0;
        }
        
        .page-header {
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .page-header h1 {
            margin: 0;
            font-size: 36px;
            margin-bottom: 10px;
        }
        
        .page-header p {
            margin: 0;
            opacity: 0.9;
        }
        
        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.6);
            animation: fadeIn 0.3s;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .modal-content {
            background-color: white;
            padding: 0;
            border-radius: 8px;
            width: 90%;
            max-width: 900px;
            max-height: 90vh;
            overflow-y: auto;
            animation: slideIn 0.3s;
        }
        
        @keyframes slideIn {
            from { transform: translateY(-50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        .modal-header {
            padding: 20px;
            border-bottom: 1px solid #ddd;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .modal-close {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: #666;
        }
        
        .modal-body {
            padding: 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }
        
        .modal-gallery {
            position: relative;
        }
        
        .modal-image {
            width: 100%;
            height: 400px;
            object-fit: cover;
            border-radius: 8px;
            background: #f5f5f5;
        }
        
        .modal-nav {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border-radius: 20px;
        }
        
        .modal-nav button {
            background: rgba(255,255,255,0.3);
            border: none;
            color: white;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
        }
        
        .modal-nav button:hover {
            background: rgba(255,255,255,0.6);
        }
        
        .product-details {
            display: flex;
            flex-direction: column;
        }
        
        .detail-name {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .detail-price {
            font-size: 28px;
            color: #e74c3c;
            font-weight: bold;
            margin-bottom: 15px;
        }
        
        .detail-section {
            margin-bottom: 20px;
        }
        
        .detail-label {
            font-weight: bold;
            color: #333;
            margin-bottom: 8px;
            text-transform: uppercase;
            font-size: 13px;
            color: #666;
        }
        
        .detail-value {
            color: #555;
            line-height: 1.6;
        }
        
        .detail-specs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .spec-item {
            background: #f8f8f8;
            padding: 12px;
            border-radius: 5px;
        }
        
        .spec-item .label {
            font-size: 12px;
            color: #999;
            text-transform: uppercase;
        }
        
        .spec-item .value {
            font-weight: bold;
            color: #333;
            margin-top: 5px;
        }
        
        .colors-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .color-badge {
            background: #f0f0f0;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 12px;
        }
        
        .btn-add-cart {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            margin-top: auto;
            transition: transform 0.2s;
        }
        
        .btn-add-cart:hover {
            transform: scale(1.05);
        }
        
        @media (max-width: 768px) {
            .modal-body {
                grid-template-columns: 1fr;
            }
            
            .modal-image {
                height: 300px;
            }
        }
    </style>
</head>

        </div>

        let currentProduct = null;
        let currentImageIndex = 0;
        
        function renderProducts() {
            const container = document.getElementById('products');
            container.innerHTML = fullProducts.map((product, idx) => {
                const images = product.images || [product.image];
                return `
                    <div class="product-card">
                        <div class="product-image-wrapper" id="gallery-${idx}">
                            <img src="${images[0]}" alt="${product.name}" class="product-image" onerror="this.src='./assets/image-fallback.png'">
                            ${images.length > 1 ? `
                                <div class="image-counter">${images.length} images</div>
                                <button class="nav-button left" onclick="event.stopPropagation(); rotateImages(${idx}, -1)">❮</button>
                                <button class="nav-button right" onclick="event.stopPropagation(); rotateImages(${idx}, 1)">❯</button>
                            ` : ''}
                        </div>
                        <div class="product-info">
                            <div class="product-category">${product.category}</div>
                            ${product.isNew ? '<span class="new-badge">NEW</span>' : ''}
                            <div class="product-name">${product.name}</div>
                            <div class="product-rating">⭐ ${product.rating} (${product.reviews} reviews)</div>
                            <div class="product-price">
                                ${product.discount > 0 ? `<del>₨${product.originalPrice}</del> ` : ''}
                                ₨${product.price}
                                ${product.discount > 0 ? ` <span style="color: #e74c3c; font-size: 12px;">-${product.discount}%</span>` : ''}
                            </div>
                        </div>
                        <div style="padding: 10px; text-align: center; border-top: 1px solid #eee; cursor: pointer; background: #f8f8f8; font-weight: bold; color: #667eea;" onclick="openProductDetail(${product.id})">
                            👁️ View Details
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        let galleryIndices = {};
        
        function rotateImages(idx, direction) {
            const gallery = document.getElementById(`gallery-${idx}`);
            if (!gallery) return;
            
            if (galleryIndices[idx] === undefined) {
                galleryIndices[idx] = 0;
            }
            
            const product = fullProducts[idx];
            const images = product.images || [product.image];
            galleryIndices[idx] = (galleryIndices[idx] + direction + images.length) % images.length;
            
            const img = gallery.querySelector('.product-image');
            img.src = images[galleryIndices[idx]];
        }
        
        function openProductDetail(productId) {
            currentProduct = fullProducts.find(p => p.id === productId);
            if (!currentProduct) return;
            
            currentImageIndex = 0;
            updateModalContent();
            document.getElementById('productModal').classList.add('active');
        }
        
        function closeProductDetail() {
            document.getElementById('productModal').classList.remove('active');
        }
        
        function updateModalContent() {
            const images = currentProduct.images || [currentProduct.image];
            
            document.getElementById('modalImage').src = images[currentImageIndex];
            document.getElementById('currentImageIndex').textContent = currentImageIndex + 1;
            document.getElementById('totalImages').textContent = images.length;
            document.getElementById('modalName').textContent = currentProduct.name;
            
            let priceHtml = currentProduct.discount > 0 
                ? `<del>₨${currentProduct.originalPrice}</del> ₨${currentProduct.price}` 
                : `₨${currentProduct.price}`;
            document.getElementById('modalPrice').innerHTML = priceHtml;
            
            document.getElementById('modalCategory').textContent = currentProduct.category;
            document.getElementById('modalPieces').textContent = currentProduct.pieces;
            document.getElementById('modalFabric').textContent = currentProduct.fabric;
            document.getElementById('modalRating').textContent = `⭐ ${currentProduct.rating} (${currentProduct.reviews} reviews)`;
            document.getElementById('modalDescription').textContent = currentProduct.description;
            
            document.getElementById('modalColors').innerHTML = currentProduct.colors.map(c => `<div class="color-badge">${c}</div>`).join('');
            document.getElementById('modalSizes').innerHTML = currentProduct.sizes.map(s => `<div class="color-badge">${s}</div>`).join('');
        }
        
        function nextImage() {
            const images = currentProduct.images || [currentProduct.image];
            currentImageIndex = (currentImageIndex + 1) % images.length;
            updateModalContent();
        }
        
        function previousImage() {
            const images = currentProduct.images || [currentProduct.image];
            currentImageIndex = (currentImageIndex - 1 + images.length) % images.length;
            updateModalContent();
        }
        
        function addToCart() {
            alert(`Added "${currentProduct.name}" to cart!`);
        }
        
        document.getElementById('productModal').addEventListener('click', function(e) {
            if (e.target === this) closeProductDetail();
        });
        
        renderProducts();
    </script>
</body>
</html>
