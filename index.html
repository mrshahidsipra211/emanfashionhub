  <body>
    <div id="root"></div>
    <script>
      // Load additional products from products-data.json
      window.additionalProducts = [];
      fetch('./products-data.json')
        .then(response => response.json())
        .then(data => {
          window.additionalProducts = data;
          console.log('✓ Loaded', data.length, 'additional products');
        })
        .catch(err => console.error('Could not load products-data.json:', err));
    </script>
    <script>
      // Handle SPA redirect from 404.html
      (function handleSPARedirect()
        var redirect = sessionStorage.redirect;
        delete sessionStorage.redirect;
        if (redirect && redirect !== window.location.pathname) {
          window.history.replaceState(null, null, redirect);
        }
      })();

      if ('scrollRestoration' in window.history) {
        window.history.scrollRestoration = 'manual';
      }

      function scrollPageToTop() {
        window.scrollTo(0, 0);
        document.documentElement.scrollTop = 0;
        document.body.scrollTop = 0;
      }

      (function normalizeHomeRoute() {
        var path = window.location.pathname || '/';
        var isIndexEntry = /\/index\.html$/i.test(path);
        if (isIndexEntry) {
          var normalizedPath = path.replace(/index\.html$/i, '');
          if (!normalizedPath) normalizedPath = '/';
          window.history.replaceState(window.history.state, '', normalizedPath + window.location.search + window.location.hash);
        }
      })();

      window.addEventListener('load', function () {
        scrollPageToTop();
      });

      window.addEventListener('pageshow', function () {
        scrollPageToTop();
      });

      window.addEventListener('popstate', function () {
        setTimeout(scrollPageToTop, 0);
      });

      (function patchHistoryForScrollReset() {
        var originalPushState = window.history.pushState;
        var originalReplaceState = window.history.replaceState;

        window.history.pushState = function () {
          var result = originalPushState.apply(window.history, arguments);
          setTimeout(scrollPageToTop, 0);
          return result;
        };

        window.history.replaceState = function () {
          var result = originalReplaceState.apply(window.history, arguments);
          setTimeout(scrollPageToTop, 0);
          return result;
        };
      })();

      document.addEventListener('error', function (event) {
        var target = event.target;
        if (!target || target.tagName !== 'IMG') return;
        if (target.dataset.fallbackApplied === '1') return;
        target.dataset.fallbackApplied = '1';
        target.src = './image-fallback.png';
      }, true);

      function getText(selector, fallback) {
        var el = document.querySelector(selector);
        return el && el.textContent ? el.textContent.trim() : fallback;
      }

      function buildOrderMessage(button) {
        var lines = ['Assalam o Alaikum, I want to place an order.'];

        var cartRows = document.querySelectorAll('.cart-item-row');
        if (cartRows && cartRows.length > 0) {
          lines.push('', 'Order details:');
          cartRows.forEach(function (row, idx) {
            var name = row.querySelector('.item-name');
            var variant = row.querySelector('.item-variant');
            var qty = row.querySelector('.quantity-control span');
            var total = row.querySelector('.col-total');

            lines.push(
              (idx + 1) +
                '. ' +
                (name ? name.textContent.trim() : 'Product') +
                ' | ' +
                (variant ? variant.textContent.trim() : 'Variant') +
                ' | Qty: ' +
                (qty ? qty.textContent.trim() : '1') +
                ' | Total: ' +
                (total ? total.textContent.trim() : 'N/A')
            );
          });

          lines.push('Grand Total: ' + getText('.total-row span:last-child', 'N/A'));
        } else {
          var productName = getText('.product-title', getText('h1', 'Product'));
          var size = getText('.size-btn.active', 'Not selected');
          var color = getText('.color-btn.active', 'Not selected');
          var qtyText = getText('.quantity-selector span', '1');
          var price = getText('.product-price .current-price', 'N/A');

          lines.push('', 'Selected item:');
          lines.push('Product: ' + productName);
          lines.push('Size: ' + size);
          lines.push('Color: ' + color);
          lines.push('Quantity: ' + qtyText);
          lines.push('Price: ' + price);
        }

        lines.push('', 'Page: ' + window.location.href);
        return lines.join('\n');
      }

      function ensureOrderSourceModal() {
        var existing = document.getElementById('order-source-modal');
        if (existing) return existing;

        var style = document.createElement('style');
        style.textContent =
          '#order-source-modal{position:fixed;inset:0;z-index:99999;display:none;align-items:center;justify-content:center;padding:16px;background:rgba(14,18,30,.58);backdrop-filter:blur(6px)}' +
          '#order-source-modal.visible{display:flex}' +
          '#order-source-modal .osm-card{width:min(92vw,420px);border-radius:18px;padding:22px 18px;background:linear-gradient(145deg,#fff 0%,#f6f9ff 100%);box-shadow:0 20px 50px rgba(14,18,30,.24);border:1px solid rgba(16,26,46,.08);font-family:Segoe UI,Tahoma,sans-serif;transform:translateY(8px);opacity:0;transition:all .22s ease}' +
          '#order-source-modal.visible .osm-card{transform:translateY(0);opacity:1}' +
          '#order-source-modal .osm-title{margin:0 0 6px;font-size:20px;font-weight:700;color:#121a2e}' +
          '#order-source-modal .osm-sub{margin:0 0 16px;font-size:14px;color:#54607a}' +
          '#order-source-modal .osm-grid{display:grid;grid-template-columns:1fr;gap:10px}' +
          '#order-source-modal .osm-btn{border:0;border-radius:12px;padding:12px 14px;font-size:15px;font-weight:700;cursor:pointer;transition:transform .12s ease,filter .12s ease}' +
          '#order-source-modal .osm-btn:hover{filter:brightness(1.02)}' +
          '#order-source-modal .osm-btn:active{transform:scale(.985)}' +
          '#order-source-modal .osm-source-1{background:#0d7b5f;color:#fff}' +
          '#order-source-modal .osm-source-2{background:#114a9c;color:#fff}' +
          '#order-source-modal .osm-cancel{background:#edf1f9;color:#22314f;font-weight:600}';
        document.head.appendChild(style);

        var modal = document.createElement('div');
        modal.id = 'order-source-modal';
        modal.innerHTML =
          '<div class="osm-card" role="dialog" aria-modal="true" aria-labelledby="osm-title">' +
          '<h3 id="osm-title" class="osm-title">Choose Order Source</h3>' +
          '<p class="osm-sub">Select where you want to send your order.</p>' +
          '<div class="osm-grid">' +
          '<button type="button" class="osm-btn osm-source-1" data-source="1">Source 1</button>' +
          '<button type="button" class="osm-btn osm-source-2" data-source="2">Source 2</button>' +
          '<button type="button" class="osm-btn osm-cancel" data-source="cancel">Cancel</button>' +
          '</div>' +
          '</div>';
        document.body.appendChild(modal);
        return modal;
      }

      function openOrderSourceModal(onSelect) {
        var modal = ensureOrderSourceModal();
        var clickHandler = function (event) {
          var sourceButton = event.target && event.target.closest ? event.target.closest('[data-source]') : null;
          if (!sourceButton) {
            if (event.target === modal) {
              closeModal(null);
            }
            return;
          }

          var source = sourceButton.getAttribute('data-source');
          if (source === 'cancel') {
            closeModal(null);
            return;
          }
          closeModal(source);
        };

        var keyHandler = function (event) {
          if (event.key === 'Escape') {
            closeModal(null);
          }
        };

        function closeModal(source) {
          modal.classList.remove('visible');
          modal.removeEventListener('click', clickHandler, true);
          document.removeEventListener('keydown', keyHandler, true);
          if (typeof onSelect === 'function') onSelect(source);
        }

        modal.classList.add('visible');
        modal.addEventListener('click', clickHandler, true);
        document.addEventListener('keydown', keyHandler, true);
      }

      function enforceOrderOnlyMode() {
        function patchButtons(root) {
          var scope = root && root.querySelectorAll ? root : document;
          var allButtons = scope.querySelectorAll('button, a');
          allButtons.forEach(function (el) {
            var text = (el.textContent || '').trim().toLowerCase();
            var classes = (el.className || '').toString().toLowerCase();
            var isAddToCart = text === 'add to cart' || text.indexOf('add to cart') !== -1 || classes.indexOf('add-to-cart') !== -1;

            if (isAddToCart) {
              el.style.display = 'none';
              el.setAttribute('aria-hidden', 'true');
            }

            var isOrderNow = text === 'order now' || text.indexOf('order now') !== -1 || classes.indexOf('buy-now-btn') !== -1;
            if (isOrderNow && el.style.display !== 'none') {
              el.style.width = '100%';
            }
          });
        }

        patchButtons(document);

        var observer = new MutationObserver(function (mutations) {
          mutations.forEach(function (mutation) {
            mutation.addedNodes.forEach(function (node) {
              if (node && node.nodeType === 1) {
                patchButtons(node);
              }
            });
          });
        });

        observer.observe(document.body, { childList: true, subtree: true });
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', enforceOrderOnlyMode);
      } else {
        enforceOrderOnlyMode();
      }

      document.addEventListener('click', function (event) {
        var button = event.target && event.target.closest ? event.target.closest('button') : null;
        var link = event.target && event.target.closest ? event.target.closest('a') : null;
        var productNavButton = event.target && event.target.closest ? event.target.closest('.product-image-nav .product-nav-btn') : null;
        var productLinkHref = link ? (link.getAttribute('href') || '') : '';
        var suppressProductNav = window.__suppressProductNavUntil && Date.now() < window.__suppressProductNavUntil;

        // Keep product card arrows focused on image switching, not card navigation.
        if (productNavButton || (suppressProductNav && /^\/product\//.test(productLinkHref))) {
          event.preventDefault();
          if (suppressProductNav) {
            window.__suppressProductNavUntil = 0;
          }
          return;
        }

        if (link) {
          var href = link.getAttribute('href') || '';
          var isInternalLink = href && href.indexOf('http') !== 0 && href.indexOf('tel:') !== 0 && href.indexOf('mailto:') !== 0 && href.indexOf('#') !== 0;

          // Convert plain internal route anchors to SPA navigation to avoid full reload.
          var isSpaRoute = /^\/(shop|product|cart|about|contact)(\/|$|\?)/.test(href);
          if (isSpaRoute) {
            event.preventDefault();
            if (window.location.pathname + window.location.search + window.location.hash !== href) {
              window.history.pushState({}, '', href);
              window.dispatchEvent(new PopStateEvent('popstate'));
            }
            setTimeout(scrollPageToTop, 0);
            return;
          }

          if (isInternalLink) {
            setTimeout(scrollPageToTop, 0);
          }
        }

        if (!button) return;

        var className = button.className || '';
        var label = (button.textContent || '').toLowerCase();
        var isOrderAction =
          className.indexOf('buy-now-btn') !== -1 ||
          className.indexOf('checkout-btn') !== -1 ||
          label.indexOf('order') !== -1 ||
          label.indexOf('checkout') !== -1 ||
          label.indexOf('buy now') !== -1;

        if (!isOrderAction) return;

        event.preventDefault();
        event.stopPropagation();
        var message = buildOrderMessage(button);
        openOrderSourceModal(function (source) {
          if (!source) return;
          var targetNumber = source === '2' ? '923438322854' : '923300794650';
          var url = 'https://wa.me/' + targetNumber + '?text=' + encodeURIComponent(message);
          window.open(url, '_blank', 'noopener,noreferrer');
        });
      }, true);

      // On touch devices, arrow tap can generate a follow-up link click. Mark and suppress it.
      document.addEventListener('pointerdown', function (event) {
        var productNavButton = event.target && event.target.closest ? event.target.closest('.product-image-nav .product-nav-btn') : null;
        if (productNavButton) {
          window.__suppressProductNavUntil = Date.now() + 1200;
        }
      }, true);

      // Improve touch navigation: first tap opens mobile dropdown, second tap follows link.
      (function enableMobileDropdownMenu() {
        document.addEventListener('click', function (event) {
          if (window.innerWidth > 768) return;
          var link = event.target && event.target.closest ? event.target.closest('.main-nav .nav-item.has-dropdown > a') : null;
          if (!link) return;
          var item = link.parentElement;
          if (!item) return;
          if (!item.classList.contains('mobile-open')) {
            event.preventDefault();
            var openItems = document.querySelectorAll('.main-nav .nav-item.has-dropdown.mobile-open');
            openItems.forEach(function (openItem) {
              if (openItem !== item) openItem.classList.remove('mobile-open');
            });
            item.classList.add('mobile-open');
          }
        }, true);

        window.addEventListener('resize', function () {
          if (window.innerWidth > 768) {
            var openItems = document.querySelectorAll('.main-nav .nav-item.has-dropdown.mobile-open');
            openItems.forEach(function (item) {
              item.classList.remove('mobile-open');
            });
          }
        });
      })();
    </script>
  </body>
